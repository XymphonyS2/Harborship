  <script>
    var is_login = "false",
      notif_error_nik = "",
      autocompleteCity = [],
      method_login = "modal",
      referer = null,
      passpharse = "60b858fe8ae649057bb997c4";

    // delete item local storage when is_login false
    if (is_login == "false") {
      localStorage.removeItem('order_data');
      localStorage.removeItem('reason_data');
      localStorage.removeItem('verification_data');
    }
    const GA_ID = 'UA-145471306-1';
    var BASE_URL = 'https://www.ferizy.com/';

    // RMS Configuration
    const RMS_ENABLE = '1'
    const RMS_HEADER_ACCESS_LOCATION = 'AKSES LOKASI ANDA TIDAK AKTIF'
    const RMS_HEADER_FAILED_BOOKING = 'PEMESANAN GAGAL'
    const RMS_MESSAGE_ACCESS_LOCATION = 'Untuk pengalaman yang lebih baik mohon aktifkan akses lokasi perangkat Anda.'
    const RMS_MESSAGE_FAILED_BOOKING = 'Pemesanan tiket hanya dapat dilakukan #radius sebelum Pelabuhan #pelabuhan.'
    let geolocationPosition;

    $(function () {
      var uri = ["info", "login", "register", "check_order", "myaccount"]
      $.ajax({
        url: BASE_URL + "info/check_member",
        method: "post",
        dataType: "json",
        success: async function (data) {
          let uri_segment = $("#uri_segment").val();
          if (!uri.includes(uri_segment)) {
            if (data.code == 1 && data.data.updated_profile == 'f') {
              SwalFerizy.fire({
                title: "Maaf, terjadi kesalahan!",
                text: "GAGAL. MOHON LENGKAPI DATA DIRI ANDA TERLEBIH DAHULU",
                icon: "info",
                confirmButtonText: "OK",
                allowEscapeKey: false,
                allowOutsideClick: false,
              }).then(() => {
                redirect(`${BASE_URL}myaccount`);
              });
            } else if (data.code == 151) {
              SwalFerizy.fire({
                title: "",
                text: data.message,
                icon: "error",
                confirmButtonText: "Ok",
                allowEscapeKey: false,
                allowOutsideClick: false,
              }).then((value) => {
                if (value.isConfirmed) {
                  redirect(`${BASE_URL}logout`);
                }
              });
            } else if (data.code == 174 || data.code == 175) {
              SwalFerizy.fire({
                title: "Error",
                text: data.message,
                icon: "error",
                confirmButtonText: "Ok",
                allowEscapeKey: false,
                allowOutsideClick: false,
              }).then(() => {
                redirect(`${BASE_URL}login`)
              });
            } else {
              if (RMS_ENABLE == '1') {
                let currentPage = window.location.href
                let isHomePage = false;
                if (BASE_URL == currentPage || BASE_URL + '#' == currentPage) {
                  isHomePage = true
                }
                if (isHomePage) {
                  if (is_login == 'true') {
                    checkValidateRadius1 = true;
                    isHitRmsApi = true;
                    validateRadius1();
                  } else {
                    checkValidateRadius1 = true;
                    await checkGeolocationPermission();
                  }
                }
              } else {
                $("#popup-info").modal("show");
              }
            }
          }
        },
        error: function (res) {
          console.log("Silahkan Hubungi Administrator");
        },
      });
    })
  </script>
